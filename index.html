<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>I Love You So Much ❤️</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background:#000;
      color:white;
      overflow:hidden;
      height:100vh;
    }
    .container { position:relative; width:100%; height:100vh; }
    .photo {
      position:absolute; border-radius:12px; box-shadow:0 0 25px rgba(255,20,147,0.6);
      border:2px solid rgba(255,255,255,0.15); object-fit:cover;
    }
    .text {
      position:absolute; font-size:1.6rem; font-weight:600;
      text-shadow:0 0 20px rgba(255,20,147,0.9); white-space:nowrap; pointer-events:none;
    }
    .heart { position:absolute; font-size:2.2rem; color:#ff2d55; pointer-events:none; }
    .play-btn {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      width:80px; height:80px; background:rgba(255,255,255,0.95); color:#000;
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:2.2rem; box-shadow:0 0 40px rgba(255,20,147,0.8); z-index:100; cursor:pointer;
    }
    .music-btn {
      position:fixed; bottom:90px; right:20px; background:rgba(255,255,255,0.15);
      backdrop-filter:blur(10px); padding:12px 20px; border-radius:50px;
      border:1px solid rgba(255,255,255,0.3); z-index:200; font-size:1.5rem; cursor:pointer;
    }
    .bottom-bar {
      position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
      background:rgba(255,255,255,0.1); backdrop-filter:blur(10px);
      padding:10px 20px; border-radius:50px; z-index:200;
    }
  </style>
</head>
<body>

  <div class="container" id="container"></div>

  <div class="play-btn" id="playBtn">▶</div>
  <div class="music-btn" id="musicBtn">🎵 Jouer la musique</div>

  <div class="bottom-bar">❤️ Pour toi ma chérie</div>

  <!-- Musique -->
  <audio id="bgMusic" loop preload="none">
    <source src="./musique.mp3" type="audio/mpeg">
  </audio>

  <script>
    const container = document.getElementById('container');
    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    let musicPlaying = false;

    const texts = ["I love you so much ❤️", "Je t'aime tellement ❤️", "Tu es tout pour moi ❤️"];
    const photos = ["./photo1.jpg","./photo2.jpg","./photo3.jpg","./photo4.jpg"];

    function createPhoto() {
      const photo = document.createElement('img');
      photo.src = photos[Math.floor(Math.random()*photos.length)];
      photo.classList.add('photo');
      const size = Math.random()*170 + 150;
      photo.style.width = `${size}px`;
      photo.style.height = `${size*1.15}px`;
      photo.style.left = `${Math.random()*85 + 5}%`;
      photo.style.top = `${Math.random()*75 + 5}%`;
      photo.style.transform = `rotate(${Math.random()*25 - 12}deg)`;
      container.appendChild(photo);

      gsap.to(photo, { y: -950, rotation: Math.random()*35-17, duration: Math.random()*22+18, repeat:-1, delay:Math.random()*-22, ease:"none"});
    }

    function createText() {
      const text = document.createElement('div');
      text.classList.add('text');
      text.textContent = texts[Math.floor(Math.random()*texts.length)];
      text.style.left = `${Math.random()*75 + 12}%`;
      text.style.top = `${Math.random()*75 + 10}%`;
      container.appendChild(text);
      gsap.to(text, { y:-1000, opacity:0.9, duration:Math.random()*17+14, repeat:-1, delay:Math.random()*-16, ease:"none"});
    }

    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '❤️';
      heart.style.left = `${Math.random()*100}%`;
      heart.style.top = '100%';
      container.appendChild(heart);
      gsap.to(heart, { y:-1350, x:Math.random()*280-140, scale:Math.random()*0.7+0.8, opacity:0, duration:Math.random()*11+9, repeat:-1, delay:Math.random()*-12, ease:"none"});
    }

    // Création des éléments
    for (let i = 0; i < 11; i++) createPhoto();
    for (let i = 0; i < 15; i++) createText();
    for (let i = 0; i < 30; i++) createHeart();

    // Bouton central
    document.getElementById('playBtn').addEventListener('click', () => {
      alert("❤️ Je t'aime de tout mon cœur !");
    });

    // Bouton Musique - Version améliorée
    musicBtn.addEventListener('click', () => {
      if (musicPlaying) {
        music.pause();
        musicBtn.textContent = "🎵 Jouer la musique";
      } else {
        // Solution pour éviter les erreurs de navigateur
        music.play()
          .then(() => {
            musicBtn.textContent = "⏸️ Pause";
            musicPlaying = true;
          })
          .catch(err => {
            console.log("Erreur musique:", err);
            alert("Clique à nouveau sur le bouton 🎵");
          });
      }
    });

    // Animation du bouton central
    gsap.to("#playBtn", {scale:1.12, duration:1.4, repeat:-1, yoyo:true, ease:"power1.inOut"});
  </script>
</body>
</html>
